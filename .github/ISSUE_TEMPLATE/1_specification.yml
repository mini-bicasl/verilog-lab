name: AI Specification
description: Capture high-level idea and generate/update ARCHITECTURE.md
title: "[AI] Specification – "
labels: ['AI-task']

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: "Select Issue Type"
      description: "This form creates a Specification issue. The workflow uses this to route; no code generation runs."
      options:
        - Specification
      default: 0
    validations:
      required: true

  - type: textarea
    id: issue_description
    attributes:
      label: "Idea or description (optional)"
      description: "Leave blank if you prefer. Agents will use ARCHITECTURE.md and any existing specs. If you write something, describe your high-level RTL idea in plain language (e.g. commercial server-grade DDR4 controller with ECC and refresh)."
      placeholder: "e.g. Implement a commercial server-grade DDR4 controller with ECC, refresh logic, and configurable timing. Target JEDEC DDR4."
    validations:
      required: false
