name: AI-Assisted Issue
description: Create an AI task for RTL/Testbench/Doc generation
title: "[AI] "
labels: ['AI-task']
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: "Select Issue Type"
      description: "Choose the type of AI task for this issue"
      options:
        - RTL
        - Testbench
        - Documentation
        - Verification
        - Setup
      default: RTL
    validations:
      required: true

  - type: textarea
    id: issue_description
    attributes:
      label: "Issue Description"
      description: "Describe the module or task for the AI agent"
      placeholder: "Provide specification or task details here"
      value: ""
    validations:
      required: true
