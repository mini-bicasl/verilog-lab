name: Step 2 - Planning
description: Generate or update the implementation plan (docs/PLAN.md) from ARCHITECTURE.md
title: "[Planning] "
labels: ['AI-task']
assignees: ['Copilot']

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: "Select Issue Type"
      description: "This form creates a Planning issue. The workflow uses this to route; no code generation runs."
      options:
        - Planning
      default: 0
    validations:
      required: true

  - type: textarea
    id: issue_description
    attributes:
      label: "Hint (optional)"
      description: "Leave blank if you prefer. Agents will use ARCHITECTURE.md to devise docs/PLAN.md (modules, dependencies, testbench/docs requirements, implementation order)."
      value: "Create an implementation plan in docs/PLAN.md for the design in docs/ARCHITECTURE.md with modules, dependencies, and implementation order."
    validations:
      required: true
