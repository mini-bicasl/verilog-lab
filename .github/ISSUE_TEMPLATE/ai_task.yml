name: AI-Assisted Task
description: Create a structured AI task for RTL/Testbench/Documentation/Verification
title: "[AI] "
labels: ['AI-task']

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: "Select Issue Type"
      description: "Choose the type of AI task for this issue."
      options:
        - RTL
        - Testbench
        - Documentation
        - Verification
        - Setup
      default: 0   # index of "RTL"
    validations:
      required: true

  - type: textarea
    id: issue_description
    attributes:
      label: "Issue Description"
      description: "Optional description for the AI agent. The agent will read ARCHITECTURE.md and PLAN.md automatically."
      placeholder: "Brief instructions for AI (optional)"
      value: "AI agent will parse ARCHITECTURE.md and PLAN.md to determine the task."
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Set the priority of this AI task."
      options:
        - High
        - Medium
        - Low
      default: 1   # index of "Medium"
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: "Additional Notes (Optional)"
      description: "Extra instructions for the AI agent."
      placeholder: "Example: follow coding style, include FSM comments, specific test cases."
      value: "No additional notes."
