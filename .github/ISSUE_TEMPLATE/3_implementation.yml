name: AI Implementation
description: Agent reads docs/PLAN.md and implements the immediate phase (RTL, testbench, docs)
title: "[Implementation] – "
labels: ['AI-task', 'rtl', 'tb', 'doc']
assignees: ['github-copilot']

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: "Select Issue Type"
      description: "This form creates an Implementation issue. The workflow runs RTL, Testbench, and Documentation agents. The agent must read docs/PLAN.md and execute the immediate phase (next unchecked items in the Incremental Implementation Order)."
      options:
        - Implementation
      default: 0
    validations:
      required: true

  - type: textarea
    id: issue_description
    attributes:
      label: "Instructions for the agent"
      description: "The agent MUST read docs/PLAN.md and implement the immediate phase (next unchecked module(s) in the Incremental Implementation Order). Leave blank for default behavior, or add hints (e.g. skip to step 5, focus on RTL only)."
      value: "Optional: e.g. Implement the immediate phase per PLAN.md. Use ARCHITECTURE.md for interfaces and behavior."
    validations:
      required: true
