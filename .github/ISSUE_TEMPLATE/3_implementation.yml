name: Step 3 - Implementation
description: Agent reads docs/PLAN.md and implements the immediate phase (RTL, testbench, docs)
title: "[Implementation] – "
labels: ['AI-task', 'rtl', 'tb', 'doc']
assignees: ['github-copilot']

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: "Select Issue Type"
      description: "This form creates an Implementation issue. Copilot will read docs/PLAN.md and execute the immediate phase (which may include multiple modules). First, Copilot should set this issue's title to \"[Implementation] – <phase_name>\" where <phase_name> is the first immediate phase in docs/PLAN.md."
      options:
        - Implementation
      default: 0
    validations:
      required: true

  - type: textarea
    id: issue_description
    attributes:
      label: "Instructions for the agent (prompt)"
      description: "This text is the main prompt for Copilot. Edit to add hints (e.g. focus on RTL only, skip to a specific PLAN step)."
      value: |
        1. Read docs/PLAN.md and identify the first immediate phase to implement (a phase can be a list of modules).
           - Use the first phase that still has unchecked items (or the first phase in the plan if none are checked/unchecked).
        2. Update this issue's title to "[Implementation] – <phase_name>" using the resolved phase name.
        3. Study .github/agents/ (and its prompt templates) to understand the requirements and expected outputs for RTL, testbench, and documentation.
        4. Execute the tasks for the resolved phase (all modules in that phase):
           - Implement synthesizable RTL for each module
           - Implement a Verilog testbench for each module
           - Write Markdown documentation for each module
    validations:
      required: true
