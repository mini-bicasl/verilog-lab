name: AI-Driven Verilog Lab Pipeline

on:
  issues:
    types: [opened]
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  ARCHITECTURE_PATH: docs/ARCHITECTURE.md
  PLAN_PATH: docs/PLAN.md

jobs:
  parse_issue:
    name: Parse issue
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    outputs:
      module_name: ${{ steps.vars.outputs.module_name }}
      run_rtl: ${{ steps.vars.outputs.run_rtl }}
      run_tb: ${{ steps.vars.outputs.run_tb }}
      run_doc: ${{ steps.vars.outputs.run_doc }}
    steps:
      - name: Checkout repo (for PLAN.md)
        uses: actions/checkout@v4

      - name: Resolve immediate module from PLAN
        id: plan
        run: |
          PLAN="${{ env.PLAN_PATH }}"
          if [ ! -f "$PLAN" ]; then
            echo "module_name=" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Unchecked modules in RTL section: lines like "- [ ] \`name\`"
          UNCHECKED=$(grep -E '^\s*-\s+\[ \]\s*`' "$PLAN" | sed -n 's/.*`\([a-z0-9_]*\)`.*/\1/p' | tr '\n' ' ')
          # Ordered list from "Incremental Implementation Order": numbered lines with `module` only
          ORDERED=$(awk '/^## Incremental Implementation Order$/{p=1;next} /^## /{p=0} p && /^[0-9]+\./ && /\`[a-z0-9_]+\`/ {gsub(/`/,""); for(i=2;i<=NF;i++) if($i!~/^\+$/ && $i~/^[a-z0-9_]+$/) print $i}' "$PLAN" | tr '\n' ' ')
          IMMEDIATE=""
          for m in $ORDERED; do
            if echo "$UNCHECKED" | grep -qw "$m"; then
              IMMEDIATE="$m"
              break
            fi
          done
          echo "module_name=${IMMEDIATE:-}" >> $GITHUB_OUTPUT
          echo "Resolved immediate module: ${IMMEDIATE:-<none>}"

      - name: Parse issue body
        id: vars
        run: |
          BODY=$(echo '${{ github.event.issue.body }}' | sed 's/\\r//g')
          # Optional override: if user wrote "module name: xxx" or "Module: xxx" in description, use it
          MODULE_FROM_BODY=$(echo "$BODY" | grep -iE '(module name|module):\s*[A-Za-z0-9_]+' | head -1 | sed -n 's/.*:\s*\([A-Za-z0-9_]*\).*/\1/p' | xargs)
          FROM_PLAN="${{ steps.plan.outputs.module_name }}"
          MODULE="${MODULE_FROM_BODY:-$FROM_PLAN}"

          # Decide which phase this issue represents.
          if echo "$BODY" | grep -q '\*\*Select Issue Type\*\*:\s*Implementation'; then
            echo "run_rtl=true" >> $GITHUB_OUTPUT
            echo "run_tb=true" >> $GITHUB_OUTPUT
            echo "run_doc=true" >> $GITHUB_OUTPUT
          else
            echo "run_rtl=false" >> $GITHUB_OUTPUT
            echo "run_tb=false" >> $GITHUB_OUTPUT
            echo "run_doc=false" >> $GITHUB_OUTPUT
          fi

          echo "module_name=${MODULE:-}" >> $GITHUB_OUTPUT

          # For Implementation: require module from PLAN (or optional override in description).
          if echo "$BODY" | grep -q '\*\*Select Issue Type\*\*:\s*Implementation'; then
            if [ -z "$MODULE" ] || [ "$MODULE" = "N/A" ]; then
              echo "::error::No immediate module found. Ensure docs/PLAN.md exists and has an unchecked item in the Incremental Implementation Order, or specify 'Module: <name>' in the issue description."
              exit 1
            fi
          fi

      - name: Update issue title with resolved module
        if: steps.vars.outputs.module_name != ''
        run: |
          gh issue edit "${{ github.event.issue.number }}" --title "[Implementation] – ${{ steps.vars.outputs.module_name }}"

  rtl_generation:
    name: RTL Generation
    runs-on: ubuntu-latest
    needs: parse_issue
    if: needs.parse_issue.outputs.run_rtl == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build context
        id: context
        run: |
          ARCH="${{ env.ARCHITECTURE_PATH }}"
          PLAN="${{ env.PLAN_PATH }}"
          [ -f "$ARCH" ] || ARCH="ARCHITECTURE.md"
          [ -f "$ARCH" ] || { echo "::error::ARCHITECTURE.md not found in repo root or docs/"; exit 1; }
          { cat "$ARCH"; echo ""; } > full_context.md
          [ -f "$PLAN" ] && { echo "--- Implementation Plan ---"; cat "$PLAN"; } >> full_context.md
          for f in INTERFACE_SPEC.md NAMING_CONVENTIONS.md TESTPLAN.md docs/INTERFACE_SPEC.md docs/TESTPLAN.md; do
            [ -f "$f" ] && { echo ""; echo "--- $f ---"; cat "$f"; } >> full_context.md
          done
          echo "context_path=full_context.md" >> $GITHUB_OUTPUT

      - name: Run AI Agent to generate RTL
        id: agent
        uses: github/agents@v1
        with:
          prompt: |
            Use the CONTEXT file: ${{ steps.context.outputs.context_path }}
            Generate synthesizable Verilog RTL for module: ${{ needs.parse_issue.outputs.module_name }}
            Follow the template in .github/agents/prompt-templates/rtl-template.md
            Include the MANDATORY JSON OUTPUT at the end of your response.
            Write RTL to rtl/${{ needs.parse_issue.outputs.module_name }}.v

      - name: Parse AI JSON output
        id: parse_json
        run: |
          mkdir -p results
          echo "${{ steps.agent.outputs.result }}" | tee results/rtl_output.json | jq '.' || true
          simulation_passed=$(echo "${{ steps.agent.outputs.result }}" | jq -r '.simulation_passed // empty')
          if [ "$simulation_passed" != "true" ]; then
            echo "::warning::Agent did not report simulation_passed=true. Continuing; verify RTL manually."
          fi

      - name: Commit RTL files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "ai/rtl-${{ needs.parse_issue.outputs.module_name }}-${{ github.run_id }}"
          git add rtl/*.v results/rtl_output.json 2>/dev/null || true
          git add results/rtl_output.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Add AI-generated RTL for ${{ needs.parse_issue.outputs.module_name }}"
          git push -u origin "ai/rtl-${{ needs.parse_issue.outputs.module_name }}-${{ github.run_id }}"

      - name: Open Pull Request
        run: |
          BASE="${{ github.event.repository.default_branch || 'main' }}"
          gh pr create --base "$BASE" --head "ai/rtl-${{ needs.parse_issue.outputs.module_name }}-${{ github.run_id }}" \
            --title "[AI] RTL: ${{ needs.parse_issue.outputs.module_name }}" \
            --body "Generated from issue #${{ github.event.issue.number }}. Add label **ready-to-merge** to merge."

  tb_generation:
    name: Testbench Generation
    runs-on: ubuntu-latest
    needs: parse_issue
    if: needs.parse_issue.outputs.run_tb == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build context
        id: context
        run: |
          ARCH="${{ env.ARCHITECTURE_PATH }}"
          PLAN="${{ env.PLAN_PATH }}"
          [ -f "$ARCH" ] || ARCH="ARCHITECTURE.md"
          [ -f "$ARCH" ] || { echo "::error::ARCHITECTURE.md not found"; exit 1; }
          { cat "$ARCH"; echo ""; } > tb_context.md
          [ -f "$PLAN" ] && { echo "--- Implementation Plan ---"; cat "$PLAN"; } >> tb_context.md
          for f in INTERFACE_SPEC.md TESTPLAN.md docs/INTERFACE_SPEC.md docs/TESTPLAN.md; do
            [ -f "$f" ] && { echo ""; echo "--- $f ---"; cat "$f"; } >> tb_context.md
          done
          echo "context_path=tb_context.md" >> $GITHUB_OUTPUT

      - name: Run AI Agent to generate Testbench
        id: agent
        uses: github/agents@v1
        with:
          prompt: |
            Use the CONTEXT file: ${{ steps.context.outputs.context_path }}
            Generate a Verilog testbench for module: ${{ needs.parse_issue.outputs.module_name }}
            Follow the template in .github/agents/prompt-templates/tb-template.md
            Include the MANDATORY JSON OUTPUT at the end.
            Write testbench to tb/${{ needs.parse_issue.outputs.module_name }}_tb.v

      - name: Parse AI JSON output
        id: parse_json
        run: |
          mkdir -p results
          echo "${{ steps.agent.outputs.result }}" | tee results/tb_output.json | jq '.' || true

      - name: Run simulation
        run: |
          iverilog -o sim.out rtl/*.v tb/*.v 2>/dev/null || true
          vvp sim.out > results/sim.log 2>&1 || true
          cat results/sim.log

      - name: Commit testbench and results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "ai/tb-${{ needs.parse_issue.outputs.module_name }}-${{ github.run_id }}"
          git add tb/*.v results/tb_output.json results/sim.log 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Add AI-generated testbench for ${{ needs.parse_issue.outputs.module_name }}"
          git push -u origin "ai/tb-${{ needs.parse_issue.outputs.module_name }}-${{ github.run_id }}"

      - name: Open Pull Request
        run: |
          BASE="${{ github.event.repository.default_branch || 'main' }}"
          gh pr create --base "$BASE" --head "ai/tb-${{ needs.parse_issue.outputs.module_name }}-${{ github.run_id }}" \
            --title "[AI] Testbench: ${{ needs.parse_issue.outputs.module_name }}" \
            --body "Generated from issue #${{ github.event.issue.number }}. Add label **ready-to-merge** to merge."

  documentation_generation:
    name: Documentation Generation
    runs-on: ubuntu-latest
    needs: parse_issue
    if: needs.parse_issue.outputs.run_doc == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build context
        id: context
        run: |
          ARCH="${{ env.ARCHITECTURE_PATH }}"
          PLAN="${{ env.PLAN_PATH }}"
          [ -f "$ARCH" ] || ARCH="ARCHITECTURE.md"
          [ -f "$ARCH" ] || { echo "::error::ARCHITECTURE.md not found"; exit 1; }
          { cat "$ARCH"; echo ""; } > doc_context.md
          [ -f "$PLAN" ] && { echo "--- Implementation Plan ---"; cat "$PLAN"; } >> doc_context.md
          for f in INTERFACE_SPEC.md NAMING_CONVENTIONS.md docs/INTERFACE_SPEC.md; do
            [ -f "$f" ] && { echo ""; echo "--- $f ---"; cat "$f"; } >> doc_context.md
          done
          echo "context_path=doc_context.md" >> $GITHUB_OUTPUT

      - name: Run AI Agent to generate Documentation
        id: agent
        uses: github/agents@v1
        with:
          prompt: |
            Use the CONTEXT file: ${{ steps.context.outputs.context_path }}
            Generate Markdown documentation for module: ${{ needs.parse_issue.outputs.module_name }}
            Follow the template in .github/agents/prompt-templates/doc-template.md
            Include the MANDATORY JSON OUTPUT at the end.
            Write doc to docs/${{ needs.parse_issue.outputs.module_name }}.md

      - name: Parse AI JSON output
        id: parse_json
        run: |
          mkdir -p results
          echo "${{ steps.agent.outputs.result }}" | tee results/doc_output.json | jq '.' || true
          plan_completed=$(echo "${{ steps.agent.outputs.result }}" | jq -r '.plan_item_completed // empty')
          if [ "$plan_completed" != "true" ]; then
            echo "::warning::Agent did not report plan_item_completed=true."
          fi

      - name: Commit documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "ai/doc-${{ needs.parse_issue.outputs.module_name }}-${{ github.run_id }}"
          git add docs/*.md results/doc_output.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Add AI-generated documentation for ${{ needs.parse_issue.outputs.module_name }}"
          git push -u origin "ai/doc-${{ needs.parse_issue.outputs.module_name }}-${{ github.run_id }}"

      - name: Open Pull Request
        run: |
          BASE="${{ github.event.repository.default_branch || 'main' }}"
          gh pr create --base "$BASE" --head "ai/doc-${{ needs.parse_issue.outputs.module_name }}-${{ github.run_id }}" \
            --title "[AI] Documentation: ${{ needs.parse_issue.outputs.module_name }}" \
            --body "Generated from issue #${{ github.event.issue.number }}. Add label **ready-to-merge** to merge."

  auto_merge:
    name: Auto-merge when ready-to-merge
    if: github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'ready-to-merge'
    runs-on: ubuntu-latest
    steps:
      - name: Merge pull request
        uses: peter-evans/merge-pull-request@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: merge
          commit-title: "${{ github.event.pull_request.title }}"
