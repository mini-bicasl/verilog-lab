name: AI-Assisted RTL Pipeline

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, labeled, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Assign AI agent and label issue
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Determine issue number
            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;
            if (!issueNumber) return;

            // Extract issue_type from GitHub form inputs
            const issueTypeRaw = context.payload.inputs?.issue_type?.toLowerCase() || "";
            let assignee = "";
            let labelToAdd = "";

            switch(issueTypeRaw) {
              case "rtl":
                assignee = "CopilotRTL";
                labelToAdd = "rtl";
                break;
              case "testbench":
                assignee = "CopilotTB";
                labelToAdd = "tb";
                break;
              case "documentation":
                assignee = "CopilotDoc";
                labelToAdd = "doc";
                break;
              case "verification":
                assignee = "CopilotTB";
                labelToAdd = "verification";
                break;
              case "setup":
                assignee = "CopilotDoc";
                labelToAdd = "setup";
                break;
              default:
                assignee = "";
            }

            // Assign agent
            if (assignee) {
              await github.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: [assignee]
              });
            }

            // Add corresponding issue type label
            if (labelToAdd) {
              await github.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [labelToAdd]
              });
            }

            // Add starting comment for the AI agent
            if (assignee) {
              await github.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `@${assignee} Assigned. Please follow the structured templates in '.github/agents/prompt-templates/' to generate outputs.`
              });
            }

      - name: Auto-merge PR if ready
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            // Skip draft PRs
            if (pr.draft) return;

            // Only merge if the PR has 'ready-to-merge' label
            if (!pr.labels.some(l => l.name === 'ready-to-merge')) return;

            // Merge PR
            await github.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });
