name: Auto-assign AI Agent

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  assign-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Determine issue type and assign agent
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue?.number || context.payload.pull_request?.number;
            if (!issueNumber) return;

            let assignee = '';
            const labels = (context.payload.issue?.labels || context.payload.pull_request?.labels || []).map(l => l.name.toLowerCase());

            // Assign based on title or label
            const title = (context.payload.issue?.title || context.payload.pull_request?.title || '').toLowerCase();
            if (title.includes('rtl') || labels.includes('rtl')) assignee = 'CopilotRTL';
            else if (title.includes('testbench') || labels.includes('tb')) assignee = 'CopilotTB';
            else if (title.includes('doc') || labels.includes('doc')) assignee = 'CopilotDoc';

            if (assignee) {
              await github.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: [assignee]
              });

              await github.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `@${assignee} Assigned. Please follow the structured template for generation.`
              });
            }
