name: Assign Copilot to AI issues

on:
  issues:
    types: [opened, labeled]

jobs:
  assign:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'AI-task')
    steps:
      - name: Assign Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          set -e
          echo "Assigning Copilot to issue #${{ github.event.issue.number }}"

          response=$(curl -sS -w " HTTP_STATUS:%{http_code}" -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }} \
            -d '{"assignees": ["copilot"]}')

          body="${response% HTTP_STATUS:*}"
          status="${response##*HTTP_STATUS:}"

          echo "Status: $status"
          echo "Response: $body"

          if [ "$status" -ge 300 ]; then
            echo "Failed to assign Copilot"
            exit 1
          fi