# RTL Generator Agent
# Used by .github/workflows/ai-pipeline.yml when label "rtl requested" is added to an issue.
# Prompt template: .github/agents/prompt-templates/rtl-template.md

name: RTL Generation

trigger:
  on: issues
  types: [labeled]
  label: "rtl"

context:
  required:
    - docs/ARCHITECTURE.md
    - docs/ARCHITECTURE.md
  optional:
    - docs/PLAN.md
    - docs/INTERFACE_SPEC.md
    - docs/NAMING_CONVENTIONS.md
    - docs/TESTPLAN.md
    - docs/INTERFACE_SPEC.md
    - docs/TESTPLAN.md
  # Workflow builds full_context.md from required (first found) + optional if present

inputs:
  module_name: "Parsed from issue body: 'Module name: <name>' or 'RTL module name: <name>'"

deliverables:
  - path: "rtl/{{ module_name }}.v"
    description: "Synthesizable Verilog RTL"
  - path: "results/rtl_output.json"
    description: "JSON summary (files, simulation_passed, coverage_percentage)"

prompt_template: ".github/agents/prompt-templates/rtl-template.md"

validation:
  - "RTL compiles with Icarus Verilog"
  - "JSON output includes simulation_passed, coverage_percentage, plan_item_completed"

output_json_schema:
  rtl_files: ["rtl/{{ module_name }}.v"]
  simulation_passed: true
  coverage_percentage: number
  plan_item_completed: true
  version: "issue_number_YYYYMMDD"
