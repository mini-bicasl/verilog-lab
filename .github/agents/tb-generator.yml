name: Testbench Generation

on:
  issue_label:
    - "tb requested"

jobs:
  generate_tb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Load context
        run: |
          cat ARCHITECTURE.md INTERFACE_SPEC.md TESTPLAN.md > tb_context.md

      - name: Run AI agent to generate testbench
        uses: github/agents@v1
        with:
          prompt: |
            <<EOF
            CONTEXT:
            {{ tb_context.md }}

            TASK:
            Generate testbench for module {{module_name}}.
            Follow TB template instructions, include MANDATORY JSON OUTPUT.
            EOF

      - name: Parse AI JSON output
        id: parse_json
        run: |
          echo "$AGENT_OUTPUT" | jq '.' > agent_tb_output.json
          simulation_passed=$(jq '.simulation_passed' agent_tb_output.json)
          if [ "$simulation_passed" != "true" ]; then
            echo "Simulation failed according to agent JSON."
            gh issue create \
              --title "Testbench Simulation Failed: {{module_name}}" \
              --body "Agent-generated testbench failed simulation. JSON output:\n$(cat agent_tb_output.json)"
            exit 1
          fi

      - name: Run simulation
        run: |
          iverilog -o sim.out rtl/*.v tb/*.v
          vvp sim.out
          if [ $? -ne 0 ]; then
            echo "Simulation execution failed. Opening issue."
            gh issue create \
              --title "Simulation Execution Failed: {{module_name}}" \
              --body "Simulation failed during runtime. See agent output and logs."
            exit 1
