name: Testbench Generation

on:
  issue_label:
    - "tb requested"

jobs:
  generate_tb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Load context
        run: |
          cat ARCHITECTURE.md INTERFACE_SPEC.md TESTPLAN.md > tb_context.md

      - name: Generate Testbench with AI Agent
        uses: github/agents@v1
        with:
          prompt: |
            <<EOF
            CONTEXT:
            {{ tb_context.md }}

            TASK:
            Generate a Verilog testbench for the module requested in the issue.

            CRITERIA:
            - Cover all input vectors and corner cases listed in TESTPLAN.md.
            - Include clocks, resets, and stimulus generation.
            - Include assertions for all interface constraints.
            - Comment each test step for clarity.
            - Structure simulation so logs and waveform files can be easily analyzed.

            VALIDATION:
            - Testbench must run and pass without errors in Icarus Verilog.
            - Generate VCD waveform file for debugging.
            EOF

      - name: Run Simulation
        run: |
          iverilog -o sim.out rtl/*.v tb/*.v
          vvp sim.out
          if [ $? -ne 0 ]; then
            echo "Simulation failed. Opening issue with logs."
            gh issue create --title "TB Generation Failure" --body "$(cat sim.log)"
            exit 1
          fi
