# Testbench Generator Agent
# Used by .github/workflows/ai-pipeline.yml when label "tb requested" is added to an issue.
# Prompt template: .github/agents/prompt-templates/tb-template.md

name: Testbench Generation

trigger:
  on: issues
  types: [labeled]
  label: "tb"

context:
  required:
    - docs/ARCHITECTURE.md
    - docs/ARCHITECTURE.md
  optional:
    - docs/PLAN.md
    - docs/INTERFACE_SPEC.md
    - docs/TESTPLAN.md
    - docs/INTERFACE_SPEC.md
    - docs/TESTPLAN.md

inputs:
  module_name: "Parsed from issue body: 'Module name: <name>'"

deliverables:
  - path: "tb/{{ module_name }}_tb.v"
    description: "Verilog testbench"
  - path: "results/tb_output.json"
    description: "JSON summary"
  - path: "results/sim.log"
    description: "Simulation log (from iverilog/vvp)"

prompt_template: ".github/agents/prompt-templates/tb-template.md"

validation:
  - "Testbench compiles with Icarus Verilog"
  - "Simulation runs (iverilog + vvp)"
  - "JSON output includes simulation_passed"

output_json_schema:
  tb_files: ["tb/{{ module_name }}_tb.v"]
  simulation_passed: true
  coverage_percentage: number
  plan_item_completed: true
  version: "issue_number_YYYYMMDD"
