name: Documentation Generator
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Generate Documentation from PLAN.md
    uses: actions/github-script@v6
    with:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      script: |
        const fs = require('fs');
        const path = require('path');

        const arch = fs.readFileSync('docs/ARCHITECTURE.md', 'utf8');
        const plan = fs.readFileSync('docs/PLAN.md', 'utf8');

        const template = fs.readFileSync('.github/agents/prompt-templates/doc-template.md', 'utf8');
        const prompt = template.replace('{{ARCHITECTURE_CONTENT}}', arch).replace('{{PLAN_CONTENT}}', plan);

        const ai_response = await generateDocumentation(prompt);

        ai_response.files.forEach(f => {
          const fullPath = path.join(process.cwd(), f.path);
          fs.mkdirSync(path.dirname(fullPath), { recursive: true });
          fs.writeFileSync(fullPath, f.content);
        });
