name: Documentation Generator
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Run Documentation AI Agent
    uses: actions/github-script@v6
    with:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      script: |
        const issue = context.payload.issue;
        if (!issue) return;

        const fs = require('fs');
        const path = require('path');

        // Load documentation prompt template
        const templatePath = '.github/agents/prompt-templates/doc-template.md';
        const template = fs.readFileSync(templatePath, 'utf8');

        // Construct AI prompt
        const prompt = template.replace('{{ISSUE_BODY}}', issue.body);

        // Call AI service (pseudo-code)
        const ai_response = await generateDocumentation(prompt); 
        // Expected ai_response.files = [{path, content}, ...]

        // Save doc files to repo
        ai_response.files.forEach(f => {
          const fullPath = path.join(process.cwd(), f.path);
          fs.mkdirSync(path.dirname(fullPath), { recursive: true });
          fs.writeFileSync(fullPath, f.content);
        });

        // Create draft PR with documentation outputs
        await github.pulls.create({
          owner: context.repo.owner,
          repo: context.repo.repo,
          head: `ai-doc/${issue.number}`,
          base: 'main',
          title: `[AI] Documentation Generation: ${issue.title}`,
          body: `Generated documentation from issue #${issue.number}`,
          draft: true
        });
