# Documentation Generator Agent
# Used by .github/workflows/ai-pipeline.yml when label "doc requested" is added to an issue.
# Prompt template: .github/agents/prompt-templates/doc-template.md

name: Documentation Generation

trigger:
  on: issues
  types: [labeled]
  label: "doc"

context:
  required:
    - docs/ARCHITECTURE.md
  optional:
    - docs/PLAN.md
    - docs/INTERFACE_SPEC.md
    - docs/NAMING_CONVENTIONS.md

inputs:
  module_name: "Parsed from issue body: 'Module name: <name>'"
  phase_name: "Resolved phase name from docs/PLAN.md (used for results/phase-<phase_name>/ scoping)"

deliverables:
  - path: "docs/{{ module_name }}.md"
    description: "Markdown documentation"
  - path: "results/phase-{{ phase_name }}/{{ module_name }}_result.json"
    description: "Per-module status JSON (doc_done flag + completion gating)"

prompt_template: ".github/agents/prompt-templates/doc-template.md"

validation:
  - "Documentation covers interfaces, behavior, and references ARCHITECTURE"
  - "results/phase-{{ phase_name }}/{{ module_name }}_result.json is updated with doc_done=true and accurate status fields"

output_json_schema:
  module: "{{ module_name }}"
  rtl_done: boolean
  tb_done: boolean
  doc_done: true
  simulation_passed: boolean
  coverage_completed: boolean
  coverage_percentage: number
  plan_item_completed: boolean
  error_summary: string
